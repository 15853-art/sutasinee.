<!DOCTYPE html>
<html lang="th">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Sarabun",sans-serif;

    background:
    linear-gradient(135deg,#2E1B18,#5D4037 50%,#A1887F);

    min-height:100vh;

    color:#4E342E;

    overflow-x:hidden;

}

/* ================= เชอร์รี่ ================= */

.cherry{

    position:fixed;

    font-size:30px;

    opacity:.75;

    animation:float 5s ease-in-out infinite;

    z-index:1;

    pointer-events:none;

}

.c1{
    top:12%;
    left:6%;
}

.c2{
    top:25%;
    right:8%;
    animation-delay:1s;
}

.c3{
    bottom:20%;
    left:8%;
    animation-delay:2s;
}

.c4{
    bottom:12%;
    right:10%;
    animation-delay:3s;
}

.c5{
    top:8%;
    left:50%;
    animation-delay:1.5s;
}

@keyframes float{

    0%,100%{

        transform:translateY(0) rotate(-5deg);

    }

    50%{

        transform:translateY(-18px) rotate(8deg);

    }

}

/* ================= NAVBAR ================= */

nav{

    position:fixed;

    top:25px;

    left:50%;

    transform:translateX(-50%);

    display:flex;

    gap:8px;

    padding:10px 18px;

    background:rgba(255,248,240,.95);

    border-radius:50px;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

    z-index:10;

}

nav a{

    text-decoration:none;

    color:#5D4037;

    padding:10px 15px;

    border-radius:25px;

    font-weight:600;

    font-size:15px;

    transition:.3s;

    white-space:nowrap;

}

nav a:hover{

    background:#6D4C41;

    color:white;

    transform:translateY(-3px);

}

/* ================= SOP ================= */

.sop{

    min-height:100vh;

    padding:140px 25px 70px;

    display:flex;

    justify-content:center;

    align-items:center;

}

.sop-card{

    max-width:1050px;

    width:100%;

    background:rgba(255,248,240,.96);

    border-radius:40px;

    padding:60px 70px;

    box-shadow:0 30px 70px rgba(0,0,0,.35);

    position:relative;

    animation:show 1s ease;

}

@keyframes show{

    from{

        opacity:0;

        transform:translateY(40px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

/* ================= หัวข้อ ================= */

.title{

    text-align:center;

    margin-bottom:40px;

}

.title small{

    letter-spacing:5px;

    font-size:16px;

    color:#8D6E63;

}

.title h1{

    font-family:"Playfair Display",serif;

    font-size:60px;

    color:#3E2723;

    margin:10px 0;

}

.title p{

    font-size:20px;

    color:#795548;

}

.line{

    width:90px;

    height:5px;

    background:#8D6E63;

    border-radius:10px;

    margin:20px auto;

}

/* ================= เนื้อหา SOP ================= */

.sop-content{

    font-size:20px;

    line-height:2.1;

    color:#5D4037;

    text-align:justify;

}

.sop-content p{

    margin-bottom:25px;

    text-indent:50px;

}

.sop-content strong{

    color:#4E342E;

}

/* ================= กล่องความฝัน ================= */

.dream{

    margin-top:35px;

    padding:25px;

    background:#F4ECE7;

    border-left:6px solid #795548;

    border-radius:0 20px 20px 0;

    text-align:center;

}

.dream h2{

    font-family:"Playfair Display",serif;

    color:#5D4037;

    margin-bottom:10px;

}

.dream p{

    font-size:22px;

    font-weight:600;

    color:#4E342E;

}

/* ================= คติ ================= */

.quote{

    margin-top:35px;

    padding:30px;

    text-align:center;

    border-top:2px solid #D7CCC8;

    border-bottom:2px solid #D7CCC8;

}

.quote p{

    font-family:"Playfair Display",serif;

    font-size:25px;

    font-style:italic;

    color:#795548;

}

/* ================= ปุ่ม ================= */

.button-box{

    text-align:center;

    margin-top:40px;

}

.btn{

    display:inline-block;

    padding:14px 30px;

    background:#5D4037;

    color:white;

    text-decoration:none;

    border-radius:30px;

    font-size:17px;
