
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว</title>

    <style>
        body{
            margin:0;
            font-family: "Sarabun", sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#fff;
            width:400px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#6c5ce7;
            margin-bottom:20px;
        }

        img{
            width:150px;
            height:150px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #6c5ce7;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            color:#333;
            margin:10px 0;
        }

        strong{
            color:#6c5ce7;
        }

        .footer{
            margin-top:20px;
            font-size:14px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- เปลี่ยน yourphoto.jpg เป็นชื่อรูปของคุณ -->
    <img src="yourphoto.jpg" alt="รูปภาพ">

    <h1>ประวัติส่วนตัว</h1>

    <p><strong>ชื่อ :</strong> สุธาศิณี นาคนวล</p>
    <p><strong>ชื่อเล่น :</strong> นาย</p>

    <div class="footer">
        💜 ยินดีต้อนรับสู่เว็บไซต์ประวัติส่วนตัว 💜
    </div>

</div>

</body>
</html>
