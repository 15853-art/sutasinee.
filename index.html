<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins","Sarabun",sans-serif;
}

body{
    background:linear-gradient(to bottom,#dff6ff,#b8e8fc,#8fd3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* การ์ด */
.card{
    width:380px;
    background:rgba(255,255,255,0.9);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,80,150,0.2);
    backdrop-filter:blur(8px);
    z-index:2;
}

/* ส่วนหัว */
.header{
    background:linear-gradient(135deg,#9bdcff,#5ab9ea);
    height:140px;
    position:relative;
}

/* รูปโปรไฟล์ */
.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid white;
    position:absolute;
    bottom:-60px;
    left:50%;
    transform:translateX(-50%);
    object-fit:cover;
}

/* เนื้อหา */
.content{
    padding:80px 30px 30px;
    text-align:center;
}

h1{
    color:#2b6cb0;
    font-size:32px;
}

h2{
    color:#4a90c2;
    font-size:18px;
    font-weight:400;
    margin:10px 0 20px;
}

.info{
    background:#eef8ff;
    border-radius:15px;
    padding:15px;
    text-align:left;
}

.info p{
    margin:12px 0;
    font-size:17px;
    color:#444;
}

.info span{
    color:#2b6cb0;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 35px;
    background:#5ab9ea;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:.3s;
}

.btn:hover{
    background:#2b6cb0;
    transform:scale(1.05);
}

/* เอฟเฟกต์หิมะ */
.snow{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    top:0;
    left:0;
}

.snow span{
    position:absolute;
    top:-10px;
    color:white;
    font-size:20px;
    animation:fall linear infinite;
    opacity:0.9;
}

@keyframes fall{
    from{
        transform:translateY(-10vh) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>

</head>
<body>

<!-- เอฟเฟกต์หิมะ -->
<div class="snow">
    <span style="left:5%;animation-duration:8s;">❄</span>
    <span style="left:12%;animation-duration:10s;font-size:15px;">❄</span>
    <span style="left:20%;animation-duration:7s;">❅</span>
    <span style="left:28%;animation-duration:9s;">❄</span>
    <span style="left:35%;animation-duration:12s;font-size:18px;">❅</span>
    <span style="left:45%;animation-duration:8s;">❄</span>
    <span style="left:55%;animation-duration:11s;">❅</span>
    <span style="left:65%;animation-duration:7s;">❄</span>
    <span style="left:75%;animation-duration:10s;">❅</span>
    <span style="left:85%;animation-duration:9s;">❄</span>
    <span style="left:95%;animation-duration:12s;">❅</span>
</div>

<div class="card">

    <div class="header">
       1000029747.jpg
        <img src="1000029747.jpg" class="profile" alt="Profile">
    </div>

    <div class="content">
        <h1>Portfolio</h1>
        <h2>Personal Profile</h2>

        <div class="info">
            <p><span>👤 ชื่อ :</span> สุธาศิณี นาคนวล</p>
            <p><span>💖 ชื่อเล่น :</span> นาย</p>
        </div>

        <a href="#" class="btn">Welcome</a>
    </div>

</div>

</body>
</html>
