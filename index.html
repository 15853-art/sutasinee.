
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins","Sarabun",sans-serif;
}

body{
    background:linear-gradient(180deg,#3E2723,#5D4037,#8D6E63);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    position:relative;
}

.card{
    width:380px;
    background:rgba(255,248,240,0.95);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
    backdrop-filter:blur(8px);
    z-index:2;
}

.header{
    height:150px;
    background:linear-gradient(135deg,#8D6E63,#5D4037);
    position:relative;
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    border:5px solid white;
    position:absolute;
    left:50%;
    bottom:-65px;
    transform:translateX(-50%);
    object-fit:cover;
}

.content{
    padding:85px 30px 30px;
    text-align:center;
}

h1{
    color:#4E342E;
    font-size:32px;
    margin-bottom:8px;
}

h2{
    color:#795548;
    font-weight:400;
    margin-bottom:20px;
}

.info{
    background:#F4ECE7;
    border-radius:15px;
    padding:18px;
    text-align:left;
}

.info p{
    margin:12px 0;
    color:#4E342E;
    font-size:17px;
}

.info span{
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:25px;
    background:#6D4C41;
    color:white;
    text-decoration:none;
    padding:12px 35px;
    border-radius:30px;
    transition:.3s;
}

.btn:hover{
    background:#4E342E;
    transform:scale(1.05);
}

.bear{
    position:absolute;
    top:-60px;
    font-size:30px;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    0%{
        transform:translateY(-100px) rotate(0deg);
    }
    100%{
        transform:translateY(120vh) rotate(360deg);
    }
}
</style>
</head>
